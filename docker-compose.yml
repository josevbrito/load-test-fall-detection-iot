# docker-compose.yml
# -------------------
# Infraestrutura completa da simulação distribuída de IoT.
#
# Serviços:
#   thingsboard   → broker MQTT + API + dashboard (servidor central)
#   postgres      → persistência do ThingsBoard
#   prometheus    → coleta métricas dos nós sensores (porta 9090)
#   grafana       → dashboards em tempo real (porta 3000)
#   sensor-node-1 → nó distribuído: devices 0–333    (334 devices)
#   sensor-node-2 → nó distribuído: devices 334–666  (333 devices)
#   sensor-node-3 → nó distribuído: devices 667–999  (333 devices)
#
# Uso rápido:
#   # Só infraestrutura (ThingsBoard + Postgres + monitoramento):
#   docker compose up thingsboard postgres prometheus grafana
#
#   # Infraestrutura + todos os nós sensores:
#   docker compose --profile sensors up
#
#   # Build da imagem do sensor (após editar load_test.py):
#   docker compose build sensor-node-1
#
# Monitoramento:
#   Grafana:    http://localhost:3000  (admin / admin)
#   Prometheus: http://localhost:9090

networks:
  # Rede bridge isolada — cada container recebe IP próprio e DNS pelo nome
  # do serviço. Simula a separação de rede que existiria numa nuvem real.
  iot-cloud:
    driver: bridge

# ---------------------------------------------------------------------------
# Âncora YAML: configuração comum a todos os nós sensores.
# Evita repetição; cada nó só declara as variáveis que diferem entre si.
# ---------------------------------------------------------------------------
x-sensor-common: &sensor-common
  build:
    context: .
    dockerfile: Dockerfile.sensor
  volumes:
    # device_tokens.json montado como read-only: não precisa rebuildar a
    # imagem se os tokens mudarem (ex: após re-provisionar devices).
    - ./device_tokens.json:/app/device_tokens.json:ro
    # results montado no host: os relatórios JSON ficam acessíveis fora
    # do container mesmo após ele encerrar.
    - ./results:/app/results
  depends_on:
    thingsboard:
      # Aguarda o ThingsBoard passar no healthcheck antes de iniciar.
      # Sem isso os nós tentariam conectar via MQTT antes do broker estar pronto.
      condition: service_healthy
  networks:
    - iot-cloud
  # "no" porque os nós rodam o teste e encerram normalmente — não devem
  # ser reiniciados automaticamente como um serviço de longa duração.
  restart: "no"
  profiles:
    - sensors

# ---------------------------------------------------------------------------
# Serviços
# ---------------------------------------------------------------------------
services:

  # ---------- Infraestrutura central --------------------------------------

  thingsboard:
    image: thingsboard/tb-postgres
    container_name: thingsboard
    restart: unless-stopped
    ports:
      - "8090:9090"   # HTTP dashboard (acesso pelo host: localhost:8090)
      - "1883:1883"   # MQTT broker
      - "7070:7070"   # Edge RPC (opcional)
    environment:
      TB_QUEUE_TYPE: in-memory
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/thingsboard
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tb-data:/data
      - tb-logs:/var/log/thingsboard
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iot-cloud
    healthcheck:
      # Verifica se a porta 9090 está aceitando conexões TCP.
      # Mais confiável que checar rotas HTTP (que dependem do frontend estar pronto).
      test: ["CMD-SHELL", "timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/9090' && echo ok"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  postgres:
    image: postgres:15-alpine
    container_name: tb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: thingsboard
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - iot-cloud
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d thingsboard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------- Monitoramento -----------------------------------------------

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"   # UI do Prometheus (http://localhost:9090)
    extra_hosts:
      # Permite que o Prometheus alcance o host (para raspar load test local).
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - iot-cloud

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"   # UI do Grafana (http://localhost:3000  admin/admin)
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/load_test.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - iot-cloud

  # ---------- Nós sensores distribuídos -----------------------------------
  # Cada nó é um processo Python independente com seu próprio IP na rede
  # iot-cloud. O ThingsBoard os enxerga como três clientes MQTT distintos.

  sensor-node-1:
    <<: *sensor-common
    container_name: sensor-node-1
    environment:
      NODE_ID: node-1
      DEVICE_OFFSET: "0"
      DEVICE_COUNT: "334"
      TB_HOST: thingsboard   # DNS interno Docker — não "localhost"
      TB_MQTT_PORT: "1883"
      METRICS_PORT: "8001"
      # EXP_REQUESTS e EXP_INTERVAL_MS permitem que o run_experiments.sh
      # ajuste a carga sem editar este arquivo. Ex: EXP_REQUESTS=50 docker compose up
      REQUESTS: ${EXP_REQUESTS:-1000}
      INTERVAL_MS: ${EXP_INTERVAL_MS:-100}

  sensor-node-2:
    <<: *sensor-common
    container_name: sensor-node-2
    environment:
      NODE_ID: node-2
      DEVICE_OFFSET: "334"
      DEVICE_COUNT: "333"
      TB_HOST: thingsboard
      TB_MQTT_PORT: "1883"
      METRICS_PORT: "8001"
      REQUESTS: ${EXP_REQUESTS:-1000}
      INTERVAL_MS: ${EXP_INTERVAL_MS:-100}

  sensor-node-3:
    <<: *sensor-common
    container_name: sensor-node-3
    environment:
      NODE_ID: node-3
      DEVICE_OFFSET: "667"
      DEVICE_COUNT: "333"
      TB_HOST: thingsboard
      TB_MQTT_PORT: "1883"
      METRICS_PORT: "8001"
      REQUESTS: ${EXP_REQUESTS:-1000}
      INTERVAL_MS: ${EXP_INTERVAL_MS:-100}

# ---------------------------------------------------------------------------
# Volumes nomeados (gerenciados pelo Docker, persistem entre restarts)
# ---------------------------------------------------------------------------
volumes:
  tb-data:
  tb-logs:
  pg-data:
  prometheus-data:
  grafana-data:

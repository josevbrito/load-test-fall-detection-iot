services:
  thingsboard:
    image: thingsboard/tb-postgres
    container_name: thingsboard
    restart: unless-stopped
    ports:
      - "8090:9090"   # HTTP dashboard
      - "1883:1883"   # MQTT broker
      - "7070:7070"   # Edge RPC (opcional)
    environment:
      TB_QUEUE_TYPE: in-memory
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/thingsboard
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tb-data:/data
      - tb-logs:/var/log/thingsboard
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/api/noauth/activate?sendActivationMail=false"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  postgres:
    image: postgres:15-alpine
    container_name: tb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: thingsboard
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d thingsboard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  tb-data:
  tb-logs:
  pg-data:

# Provisionamento automático do datasource Prometheus no Grafana.
# O Grafana lê este arquivo na inicialização e configura a fonte de dados
# sem precisar de intervenção manual na UI.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
